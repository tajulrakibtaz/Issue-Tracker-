<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Issue Tracker || Home</title>
     <!-- daisy and tailwind -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <!-- font awsome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />
</head>
<body class="max-w-[1600px] m-auto">
    <!-- nav bar -->
     <nav>
        <div class="navbar bg-base-100 shadow-sm p-5 flex flex-col md:flex-row gap-5 ">
            <div class="flex-1">
                <div class="flex gap-3">
                    <img class="max-w-[36px]" src="assets/github-logo.png" alt="">
                    <p class="font-bold text-[24px]">GitHub Issues Tracker</p>
                </div>

            </div>
            <div class="flex gap-2">

                <div class="relative w-full max-w-md">

                    <i class="fa-solid fa-magnifying-glass absolute left-3 top-1/2 -translate-y-1/2 text-gray-400"></i>

                    <input type="text" id="searchInput" placeholder="Search issues..."
                        class="w-full border border-gray-300 rounded-md py-2 pl-10 pr-4 " />

                </div>
                <div class="w-[180px]">
                    <button class="btn btn-primary">+ New Issue</button>
                </div>
            </div>
        </div>
    </nav>
<!-- selected btn  -->

  <div class="max-w-[1110px] m-auto p-8 mt-6 shadow flex flex-col md:flex-row gap-5">
        <button id="allBtn" class="bg-purple-700 text-white w-[100px] rounded-md ">All</button>
        <button id="openBtn" class="bg-gray-300  text-black w-[100px] rounded-md">Open</button>
        <button id="closedBtn" class="bg-gray-300 text-black w-[100px] rounded-md ">Closed</button>
    </div>
<!-- main calculated part -->
 <main class="max-w-[1110px] m-auto p-8 mt-6 shadow">
        <nav class="flex justify-between">
            <div class="flex gap-4">
                <div class="bg-purple-300 rounded-full p-3 h-full"> <img src="assets/Aperture.png" alt="" srcset="">
                </div>
                <div>
                    <p class="text-[20px] font-semibold"><span id="total">0</span> Issues</p>
                    <p>Track and manage your project issues</p>
                </div>
            </div>
            <div class="flex gap-3">
                <div class="flex gap-2">
                    <div class="bg-green-600 p-1.5 h-2 rounded-full mt-2"></div>
                    <div>Open</div>
                </div>
                <div class="flex gap-2">
                    <div class="bg-purple-600 p-1.5 h-2 rounded-full mt-2"></div>
                    <div>Closed</div>
                </div>
            </div>
        </nav>





    </main>


    <!-- loading spiner -->
 <div id="loadingDisplay" class="m-auto hidden justify-center items-center h-[60vh]">
<span class="loading loading-ring loading-xl"></span>

</div>


<!-- card container -->
 <main id="cardContainer" class="max-w-[1110px] m-auto p-3 mt-0 shadow space-y-5  grid grid-cols-4">
     <!-- loading spiner -->

    
       
    </main>

    <!-- details card -->
<dialog id="issueModal" class="modal">
  <div class="modal-box max-w-2xl">

    <h2 id="modalTitle" class="text-2xl font-bold mb-2"></h2>

    <div class="flex gap-2 items-center mb-4">
      <span id="modalStatus" class="badge"></span>
      <span id="modalAuthor" class="text-gray-500"></span>
      <span id="modalDate" class="text-gray-500"></span>
    </div>

    <div id="modalLabels" class="flex gap-2 mb-4"></div>

    <p id="modalDescription" class="mb-6 text-gray-700"></p>

    <div class="flex justify-between bg-gray-100 p-4 rounded-lg mb-4">
      <div>
        <p class="text-gray-500 text-sm">Assignee:</p>
        <p id="modalAssignee" class="font-semibold"></p>
      </div>

      <div>
        <p class="text-gray-500 text-sm">Priority:</p>
        <span id="modalPriority" class="badge"></span>
      </div>
    </div>

    <div class="modal-action">
      <form method="dialog">
        <button class="btn btn-primary">Close</button>
      </form>
    </div>

  </div>
</dialog>






    <script src="script/home.js"></script>

</body>
</html>
